name: build-mac

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    env:
      ARCH: arm64
      RUST_TARGET: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install just + cargo-nextest
        run: |
          brew install just cargo-nextest

      - name: Upgrade npm to match local lockfile generator
        run: npm install -g npm@11

      - name: Install npm deps
        working-directory: app
        run: npm ci

      - name: Lint
        run: just lint

      - name: Test
        run: just test

      - name: Build sidecar (release)
        run: cargo build --release --target $RUST_TARGET -p inference-core

      - name: Copy sidecar into app resources
        run: |
          mkdir -p app/resources
          cp target/$RUST_TARGET/release/inference-core app/resources/inference-core

      - name: Build DMG (unsigned in M0)
        working-directory: app
        env:
          SKIP_NOTARIZATION: "true"
        run: npm run make -- --arch $ARCH

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: local-dictation-app-arm64-unsigned
          path: app/out/make/**/*.dmg
          retention-days: 30
          if-no-files-found: error
